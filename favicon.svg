  <!-- 흰색 원형 배경 (숫자 영역) -->
  <circle cx="32" cy="32" r="16" fill="white" opacity="0.92"/>
  <!-- 숫자 7 -->
  <text x="32" y="41" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" text-anchor="middle" fill="#222">7</text>
