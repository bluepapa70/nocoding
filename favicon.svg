<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 공 배경 그림자 -->
  <circle cx="32" cy="34" r="28" fill="rgba(0,0,0,0.15)"/>
  <!-- 노란 로또공 (1~10번: 노란색) -->
  <circle cx="32" cy="32" r="28" fill="#FBC400"/>
  <!-- 하이라이트 (광택) -->
